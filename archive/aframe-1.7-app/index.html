<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Procedural A-Frame world</title>
    <link rel="icon" href="data:," />
    <!-- If GitHub Pages serves from a subpath (project site), set href to "/REPO_NAME/". -->
    <!-- <base href="/A-frame-world-generator/" /> -->
    <!-- Offline: A-Frame controller + text fonts load from libs/aframe-cdn/ (never cdn.aframe.io). -->
    <script>
      window.AFRAME_CDN_ROOT = new URL('libs/aframe-cdn/', document.baseURI).href;
    </script>
    <!-- A-Frame's ESM build uses bare `import ... from "three"`; map it to vendored super-three. -->
    <script type="importmap">
      {
        "imports": {
          "three": "./libs/three/three.module.js"
        }
      }
    </script>
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <!-- a-game reads this in drop() when using kinematicGrab (Accelerate-editor hook); unchecked = no-op -->
    <input type="checkbox" id="save-position-from-vr" hidden aria-hidden="true" />
    <!--
      Empty until js/main.js runs: ESM evaluates `import aframe` before any `await`, so a static
      <a-scene> here would upgrade and init *before* a-game loads — physics/body components would
      not exist yet (1.3 test avoids that by sync <head> scripts: aframe → a-game → then <a-scene>).
    -->
    <div id="scene-host"></div>
  </body>
</html>
