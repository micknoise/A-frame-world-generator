<!DOCTYPE html>
<!--
  BSP + RIDGE ARENA DEMO (legacy main scene — site home is index.html)
  ====================================================================
  A-Frame 1.3 + a-game + BSP/ridge hybrid world in #world-root.

  Serve the REPOSITORY ROOT over HTTP (e.g. python3 -m http.server). Do not use file:// — relative
  paths to libs/ and the Cannon worker will break.

  DATA FLOW (high level)
  ----------------------
  1) Scripts load in a fixed order (see <head> comments): CDN rewrite → A-Frame → strip grabbable →
     a-game → bsp / ridge / combine / grid-build → generator (defines window.generateWorld).
  2) After <a-scene> fires "loaded", the inline boot script calls generateWorld(world-root, seed).
  3) generateWorld (js/world/generator.js) runs BSP + ridge carve and buildAgameTileWorld, which
     appends <a-box> entities with floor / wall / start and physics props under #world-root.
  4) The player entity is moved to spawnWorld from the return value so you start inside the dungeon.

  URL INTERFACE
  -------------
  ?seed=42 — integer seed for the whole procedural chain (BSP RNG + ridge phase + crate scatter).
  Omit ?seed — defaults to 1.

  GITHUB PAGES (project site URL …/REPO_NAME/)
  --------------------------------------------
  If relative asset URLs ever mis-resolve (rare when every link is document-relative), uncomment
  <base href="/A-frame-world-generator/" /> in <head> and match your repo name. See README.md.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Procedural A-Frame world — arena</title>
    <!-- Avoids a useless /favicon.ico request; safe to remove. -->
    <link rel="icon" href="data:," />
    <!--
      Optional for GitHub Pages project sites only, if you see 404s on libs/ or the worker:
      <base href="/A-frame-world-generator/" />
    -->

    <!--
      Offline / local VR: A-Frame requests cdn.aframe.io assets; aframe-cdn-rewrite.js + this root
      redirect those fetches to libs/aframe-cdn/. Must run BEFORE aframe-v1.3.0.min.js.
    -->
    <script>
      window.AFRAME_CDN_ROOT = new URL('libs/aframe-cdn/', document.baseURI).href;
    </script>
    <script src="js/aframe-cdn-rewrite.js"></script>
    <script src="libs/aframe/aframe-v1.3.0.min.js"></script>
    <!--
      a-game registers its own grabbable; A-Frame 1.3’s stock component conflicts — delete before a-game.
    -->
    <script>
      if (window.AFRAME && AFRAME.components && AFRAME.components.grabbable) {
        delete AFRAME.components.grabbable;
      }
    </script>
    <script src="libs/a-game/a-game.min.js"></script>
    <!--
      World pipeline (order matters — generator.js expects these globals):
      bsp-dungeon.js     → generateBspDungeon
      ridge-field.js     → WorldGenRidge.sampleRidgeGrid, ridgedFbm, …
      combine-bsp-ridge.js → WorldGenCombine.carveFromBsp, …
      grid-build.js      → buildAgameTileWorld
      generator.js       → window.generateWorld(root, seed)
    -->
    <script src="js/world/bsp-dungeon.js"></script>
    <script src="js/world/ridge-field.js"></script>
    <script src="js/world/combine-bsp-ridge.js"></script>
    <!-- ?v= bumps cache after deploy (GitHub Pages + browsers cache JS aggressively). -->
    <script src="js/world/grid-build.js?v=tierA-pbr-6"></script>
    <script src="js/world/generator.js"></script>
  </head>
  <body>
    <a
      href="index.html"
      style="position: fixed; top: 8px; left: 8px; z-index: 10; font: 13px system-ui, sans-serif; padding: 6px 10px; background: rgba(0, 0, 0, 0.55); color: #fff; border-radius: 6px; text-decoration: none"
      >← Procedural examples</a
    >
    <input type="checkbox" id="save-position-from-vr" hidden aria-hidden="true" />

    <a-scene
      id="scene"
      physics="workerUrl: libs/a-game/cannonWorker.min.js?v=hull-guard-1; gravity: 0 -10 0"
      loading-screen="enabled: false"
    >
      <a-assets></a-assets>
      <a-light type="ambient" color="#000000" intensity="0.05"></a-light>
      <a-light type="directional" color="#fff5e6" intensity="0.15" position="2 6 4"></a-light>
      <a-sky color="#b9e8ff"></a-sky>
      <a-entity id="world-root"></a-entity>
      <a-player id="player" locomotion grabbing position="0 0 2"></a-player>
    </a-scene>

    <script>
      window.addEventListener('unhandledrejection', function (event) {
        var name = event.reason && event.reason.name;
        var msg = String((event.reason && event.reason.message) || event.reason || '');
        if (name === 'WrongDocumentError' || msg.indexOf('Pointer lock') !== -1) {
          event.preventDefault();
        }
      });

      function refreshRaycasters(rootScene) {
        var nodes = rootScene.querySelectorAll('[raycaster]');
        for (var i = 0; i < nodes.length; i++) {
          var rc = nodes[i].components && nodes[i].components.raycaster;
          if (rc && typeof rc.refreshObjects === 'function') rc.refreshObjects();
        }
      }

      function relaxPointerLockOnCamera(rootScene) {
        var cam = rootScene.querySelector('a-camera');
        if (!cam) return;
        cam.setAttribute('look-controls', {
          pointerLockEnabled: false,
          touchEnabled: false
        });
      }

      var scene = document.getElementById('scene');
      var seed = 1;
      var q = new URLSearchParams(location.search).get('seed');
      if (q != null) seed = parseInt(q, 10) || 1;

      scene.addEventListener(
        'loaded',
        function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              var root = document.getElementById('world-root');
              var meta = window.generateWorld(root, seed);
              if (meta && meta.spawnWorld) {
                var sw = meta.spawnWorld;
                document.getElementById('player').setAttribute('position', sw.x + ' 0 ' + sw.z);
              }
              requestAnimationFrame(function () {
                refreshRaycasters(scene);
                setTimeout(function () {
                  refreshRaycasters(scene);
                }, 120);
                requestAnimationFrame(function () {
                  requestAnimationFrame(function () {
                    relaxPointerLockOnCamera(scene);
                  });
                });
              });
            });
          });
        },
        { once: true }
      );
    </script>
  </body>
</html>
