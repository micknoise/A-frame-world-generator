<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BSP cavern — smin + arch + rock noise</title>
    <link rel="icon" href="data:," />
    <script>
      window.AFRAME_CDN_ROOT = new URL('../../libs/aframe-cdn/', document.baseURI).href;
    </script>
    <script src="../../js/aframe-cdn-rewrite.js"></script>
    <script src="../../libs/aframe/aframe-v1.3.0.min.js"></script>
    <script>
      if (window.AFRAME && AFRAME.components && AFRAME.components.grabbable) {
        delete AFRAME.components.grabbable;
      }
    </script>
    <script src="../../libs/a-game/a-game.min.js"></script>
    <script src="../../js/world/mc-tables.js"></script>
    <script src="../../js/world/bsp-dungeon.js"></script>
    <script src="../../js/world/cavern.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
      #hud {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        background: rgba(0,0,0,0.78); color: #dce8f0; padding: 16px 20px;
        border-radius: 8px; border: 1px solid rgba(200,220,240,0.12);
        max-width: 300px; font-size: 13px; line-height: 1.6;
      }
      #hud h2 { font-size: 14px; margin-bottom: 10px; color: #b0c4de; font-weight: 600; }
      #hud label { display: flex; justify-content: space-between; align-items: center; margin: 3px 0; }
      #hud label span { min-width: 32px; text-align: right; }
      #hud input[type=range]  { width: 110px; accent-color: #90caf9; }
      #hud input[type=number] { width: 55px; background: rgba(255,255,255,0.06);
        border: 1px solid rgba(200,220,240,0.18); color: #dce8f0;
        padding: 2px 6px; border-radius: 4px; font-size: 12px; }
      #hud button { margin-top: 10px; width: 100%; padding: 8px;
        background: #1565c0; color: #e3f2fd; border: none;
        border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
      #hud button:hover { background: #1976d2; }
    </style>
  </head>
  <body>
    <div id="hud">
      <h2>BSP Cavern</h2>
      <label>Seed        <input type="number" id="seed"     value="1"></label>
      <label>Grid W      <input type="number" id="gridW"    value="40" min="16" max="72"></label>
      <label>Grid H      <input type="number" id="gridH"    value="34" min="16" max="72"></label>
      <label>Dome lift   <input type="range"  id="domeAmp"  min="1.5" max="10"  step="0.1" value="6">  <span id="domeAmpV">6</span></label>
      <label>Dome fall   <input type="range"  id="domeFall" min="0.5" max="5"   step="0.05" value="2.2"><span id="domeFallV">2.2</span></label>
      <label>Smooth K    <input type="range"  id="smoothK"  min="0.15" max="2.1" step="0.02" value="0.85"><span id="smoothKV">0.85</span></label>
      <label>Voxel step  <input type="range"  id="voxelStep" min="0.38" max="0.85" step="0.02" value="0.84"><span id="voxelStepV">0.84</span></label>
      <button id="genBtn">&#9654; Regenerate</button>
    </div>

    <input type="checkbox" id="save-position-from-vr" hidden aria-hidden="true" />

    <a-scene
      id="scene"
      renderer="antialias: true; colorManagement: true"
      physics="workerUrl: ../../libs/a-game/cannonWorker.min.js?v=hull-guard-1; gravity: 0 -10 0"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
    >
      <a-assets></a-assets>
      <a-light type="ambient" color="#020504" intensity="0.01"></a-light>
      <a-sky color="#000000"></a-sky>
      <a-entity id="world-root"></a-entity>
      <a-player id="player" locomotion grabbing position="0 0 0"></a-player>
    </a-scene>

    <script>
      window.addEventListener('unhandledrejection', function (e) {
        var msg = String((e.reason && e.reason.message) || e.reason || '');
        if ((e.reason && e.reason.name) === 'WrongDocumentError' || msg.indexOf('Pointer lock') !== -1)
          e.preventDefault();
      });

      // Live-update range labels
      ['domeAmp', 'domeFall', 'smoothK', 'voxelStep'].forEach(function (id) {
        var el = document.getElementById(id);
        el.addEventListener('input', function () { document.getElementById(id + 'V').textContent = el.value; });
      });

      var CS = 3, WH = 3.5;
      var _spot = null, _target = null, _spotDir = null, _spotQ = null;

      function ensureSpotlight() {
        if (_spot) return;
        var THREE = AFRAME.THREE;
        var s = document.getElementById('scene').object3D;
        _spot    = new THREE.SpotLight(0xc4601a, 0.75, 24, Math.PI * 0.38, 0.55, 2);
        _target  = new THREE.Object3D();
        _spotDir = new THREE.Vector3();
        _spotQ   = new THREE.Quaternion();
        s.add(_spot); s.add(_target);
        _spot.target = _target;
      }

      function startTorch() {
        ensureSpotlight();
        var running = false;
        if (running) return;
        running = true;
        (function frame(now) {
          if (!_spot) { requestAnimationFrame(frame); return; }
          var t   = now * 0.001;
          var cam = document.getElementById('scene').querySelector('a-camera');
          if (cam && cam.object3D) {
            cam.object3D.getWorldPosition(_spot.position);
            cam.object3D.getWorldQuaternion(_spotQ);
            _spotDir.set(0, 0, -1).applyQuaternion(_spotQ);
            _target.position.copy(_spot.position).addScaledVector(_spotDir, 10);
            _target.updateMatrixWorld();
          }
          var flicker = Math.sin(t * 7.3) * 0.10 + Math.sin(t * 13.7) * 0.06 + Math.sin(t * 23.1) * 0.04;
          _spot.intensity = Math.max(0.2, 0.75 * (1 + flicker));
          requestAnimationFrame(frame);
        })(0);
      }

      function clearWorld() {
        var root = document.getElementById('world-root');
        root.object3D.traverse(function (o) {
          if (o.geometry) o.geometry.dispose();
          if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); }
        });
        while (root.lastChild) root.removeChild(root.lastChild);
        while (root.object3D.children.length) root.object3D.remove(root.object3D.children[0]);
      }

      function buildWorld() {
        clearWorld();
        var seed    = parseInt(document.getElementById('seed').value,  10) || 1;
        var gridW   = parseInt(document.getElementById('gridW').value, 10) || 40;
        var gridH   = parseInt(document.getElementById('gridH').value, 10) || 34;
        var kMul    = parseFloat(document.getElementById('smoothK').value);
        var domeAmp = parseFloat(document.getElementById('domeAmp').value);
        var domeFall = parseFloat(document.getElementById('domeFall').value);
        var step    = parseFloat(document.getElementById('voxelStep').value);

        var bsp  = generateBspDungeon(seed, { width: gridW, height: gridH, minLeafSize: 8, maxDepth: 4 });
        var out  = buildCavern(document.getElementById('world-root'), bsp.tiles, bsp.regions, {
          seed:       seed,
          cellSize:   CS,
          wallHeight: WH,
          smoothK:    CS * kMul,
          voxelStep:  step,
          domeAmp:    domeAmp,
          domeFall:   domeFall
        });

        var player = document.getElementById('player');
        player.setAttribute('position',
          out.spawnWorld.x + ' ' + out.spawnWorld.y + ' ' + out.spawnWorld.z);
        // Zero out cannon.js velocity so old momentum doesn't carry over
        var body = player.components['dynamic-body'] && player.components['dynamic-body'].body;
        if (body) {
          body.velocity.set(0, 0, 0);
          body.angularVelocity.set(0, 0, 0);
          body.position.set(out.spawnWorld.x, out.spawnWorld.y, out.spawnWorld.z);
          body.wakeUp();
        }

        startTorch();

        requestAnimationFrame(function () {
          var nodes = document.getElementById('scene').querySelectorAll('[raycaster]');
          for (var i = 0; i < nodes.length; i++) {
            var rc = nodes[i].components && nodes[i].components.raycaster;
            if (rc && rc.refreshObjects) rc.refreshObjects();
          }
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              var cam = document.getElementById('scene').querySelector('a-camera');
              if (cam) cam.setAttribute('look-controls', { pointerLockEnabled: false, touchEnabled: false });
            });
          });
        });
      }

      document.getElementById('genBtn').addEventListener('click', buildWorld);
      document.getElementById('scene').addEventListener('loaded', function () {
        requestAnimationFrame(function () { requestAnimationFrame(buildWorld); });
      }, { once: true });
    </script>
  </body>
</html>
