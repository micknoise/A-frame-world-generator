<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BSP noise dungeon — organic cave mesh</title>
    <link rel="icon" href="data:," />
    <!-- For GitHub Pages project sites: <base href="/A-frame-world-generator/" /> -->
    <script>
      window.AFRAME_CDN_ROOT = new URL('../../libs/aframe-cdn/', document.baseURI).href;
    </script>
    <script src="../../js/aframe-cdn-rewrite.js"></script>
    <script src="../../libs/aframe/aframe-v1.3.0.min.js"></script>
    <script>
      if (window.AFRAME && AFRAME.components && AFRAME.components.grabbable) {
        delete AFRAME.components.grabbable;
      }
    </script>
    <script src="../../libs/a-game/a-game.min.js"></script>
    <script src="../../js/world/bsp-dungeon.js"></script>
    <script src="../../js/world/noise-dungeon.js"></script>
  </head>
  <body>
    <input type="checkbox" id="save-position-from-vr" hidden aria-hidden="true" />

    <!-- ── HUD ─────────────────────────────────────────────────────── -->
    <div id="hud" style="
      position:fixed; top:16px; left:16px; z-index:10;
      background:rgba(0,0,0,0.78); color:#c8d6c9; padding:16px 20px;
      border-radius:8px; backdrop-filter:blur(8px);
      border:1px solid rgba(200,220,201,0.15);
      max-width:330px; font-family:system-ui,sans-serif; font-size:13px; line-height:1.55;
    ">
      <h2 style="font-size:14px; margin:0 0 10px; color:#a5c6a7; letter-spacing:0.5px; font-weight:600;">
        Noise Dungeon
      </h2>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Seed <input type="number" id="seed" value="1" style="width:65px; background:rgba(255,255,255,0.08); border:1px solid rgba(200,230,201,0.2); color:#c8d6c9; padding:2px 6px; border-radius:4px; font-family:inherit; font-size:12px;">
        </label>
      </div>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Grid W <input type="number" id="gridW" value="48" min="16" max="80" style="width:55px; background:rgba(255,255,255,0.08); border:1px solid rgba(200,230,201,0.2); color:#c8d6c9; padding:2px 6px; border-radius:4px; font-family:inherit; font-size:12px;">
        </label>
      </div>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Grid H <input type="number" id="gridH" value="40" min="16" max="80" style="width:55px; background:rgba(255,255,255,0.08); border:1px solid rgba(200,230,201,0.2); color:#c8d6c9; padding:2px 6px; border-radius:4px; font-family:inherit; font-size:12px;">
        </label>
      </div>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Noise Scale <input type="range" id="noiseScale" min="0.1" max="1.5" step="0.05" value="0.4" style="width:120px; accent-color:#66bb6a;"><span id="noiseScaleVal">0.4</span>
        </label>
      </div>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Floor Bump <input type="range" id="floorDisp" min="0" max="0.4" step="0.02" value="0.12" style="width:120px; accent-color:#66bb6a;"><span id="floorDispVal">0.12</span>
        </label>
      </div>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Wall Bump <input type="range" id="wallDisp" min="0" max="0.8" step="0.02" value="0.35" style="width:120px; accent-color:#66bb6a;"><span id="wallDispVal">0.35</span>
        </label>
      </div>
      <div style="margin-bottom:6px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          Ceiling Bump <input type="range" id="ceilDisp" min="0" max="0.6" step="0.02" value="0.25" style="width:120px; accent-color:#66bb6a;"><span id="ceilDispVal">0.25</span>
        </label>
      </div>
      <button id="generateBtn" style="
        margin-top:10px; width:100%; padding:8px;
        background:#2e7d32; color:#e8f5e9; border:none;
        border-radius:6px; cursor:pointer; font-family:inherit;
        font-size:13px; letter-spacing:0.3px;
      ">&#9654; Regenerate</button>
      <div style="font-size:11px; color:#81c784; margin-top:8px; opacity:0.65;">
        WASD to move · Click to capture · Esc to release · ?seed=N in URL
      </div>
    </div>

    <!-- ── A-Frame scene ──────────────────────────────────────────── -->
    <a-scene
      id="scene"
      physics="workerUrl: ../../libs/a-game/cannonWorker.min.js?v=hull-guard-1; gravity: 0 -10 0"
      loading-screen="enabled: false"
    >
      <a-assets></a-assets>

      <!-- Dim ambient — player torch provides primary lighting -->
      <a-light type="ambient" color="#223311" intensity="0.15"></a-light>
      <a-sky color="#0a0e14"></a-sky>

      <a-entity id="world-root"></a-entity>
      <a-player id="player" locomotion grabbing position="0 0 0"></a-player>
    </a-scene>

    <!-- ── boot script ────────────────────────────────────────────── -->
    <script>
      /* Suppress pointer-lock / wrong-document errors from a-game */
      window.addEventListener('unhandledrejection', function (event) {
        var name = event.reason && event.reason.name;
        var msg = String((event.reason && event.reason.message) || event.reason || '');
        if (name === 'WrongDocumentError' || msg.indexOf('Pointer lock') !== -1) {
          event.preventDefault();
        }
      });

      function refreshRaycasters(rootScene) {
        var nodes = rootScene.querySelectorAll('[raycaster]');
        for (var i = 0; i < nodes.length; i++) {
          var rc = nodes[i].components && nodes[i].components.raycaster;
          if (rc && typeof rc.refreshObjects === 'function') rc.refreshObjects();
        }
      }

      function relaxPointerLockOnCamera(rootScene) {
        var cam = rootScene.querySelector('a-camera');
        if (!cam) return;
        cam.setAttribute('look-controls', { pointerLockEnabled: false, touchEnabled: false });
      }

      /* ---- slider value display ---- */
      ['noiseScale', 'floorDisp', 'wallDisp', 'ceilDisp'].forEach(function (id) {
        var el = document.getElementById(id);
        var val = document.getElementById(id + 'Val');
        el.addEventListener('input', function () { val.textContent = el.value; });
      });

      /* ---- seed from URL ---- */
      var qs = new URLSearchParams(location.search).get('seed');
      if (qs != null) document.getElementById('seed').value = parseInt(qs, 10) || 1;

      var sceneEl = document.getElementById('scene');

      function clearWorldRoot() {
        var root = document.getElementById('world-root');
        root.object3D.traverse(function (obj) {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(function (m) { m.dispose(); });
            else if (obj.material.dispose) obj.material.dispose();
          }
        });
        while (root.lastChild) root.removeChild(root.lastChild);
        while (root.object3D.children.length) root.object3D.remove(root.object3D.children[0]);
      }

      function buildWorld() {
        clearWorldRoot();
        var root = document.getElementById('world-root');

        var seed  = parseInt(document.getElementById('seed').value, 10) || 1;
        var gridW = parseInt(document.getElementById('gridW').value, 10) || 48;
        var gridH = parseInt(document.getElementById('gridH').value, 10) || 40;

        // 1) Generate BSP layout
        var bsp = generateBspDungeon(seed, {
          width: gridW,
          height: gridH,
          minLeafSize: 8,
          maxDepth: 4
        });

        // 2) Build noise-displaced mesh dungeon from BSP tiles
        var out = NoiseDungeon.build(root, bsp.tiles, {
          seed: seed,
          cellSize: 3,
          wallHeight: 3.5,
          noiseScale: parseFloat(document.getElementById('noiseScale').value),
          octaves: 4,
          floorDisplacement: parseFloat(document.getElementById('floorDisp').value),
          wallDisplacement: parseFloat(document.getElementById('wallDisp').value),
          ceilingDisplacement: parseFloat(document.getElementById('ceilDisp').value),
          subdivisions: 6
        });

        // 3) Position player at spawn
        var player = document.getElementById('player');
        player.setAttribute('position',
          out.spawnWorld.x + ' ' + out.spawnWorld.y + ' ' + out.spawnWorld.z);

        // 4) Attach torch to camera inside player rig for cave lighting
        var cam = player.querySelector('[camera], a-camera');
        if (cam) {
          var oldTorch = cam.querySelector('#torch');
          if (oldTorch) oldTorch.parentNode.removeChild(oldTorch);
          var torch = document.createElement('a-entity');
          torch.id = 'torch';
          torch.setAttribute('light',
            'type: point; color: #d4c090; intensity: 2.0; distance: 30; decay: 2');
          cam.appendChild(torch);
        }

        requestAnimationFrame(function () {
          refreshRaycasters(sceneEl);
          setTimeout(function () { refreshRaycasters(sceneEl); }, 120);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              relaxPointerLockOnCamera(sceneEl);
            });
          });
        });
      }

      document.getElementById('generateBtn').addEventListener('click', buildWorld);

      sceneEl.addEventListener('loaded', function () {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            buildWorld();
          });
        });
      }, { once: true });
    </script>
  </body>
</html>
