<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noise terrain (A-Frame 1.3 + a-game)</title>
    <link rel="icon" href="data:," />
    <!-- For GitHub Pages project sites: <base href="/A-frame-world-generator/" /> -->
    <script>
      window.AFRAME_CDN_ROOT = new URL('../../libs/aframe-cdn/', document.baseURI).href;
    </script>
    <script src="../../js/aframe-cdn-rewrite.js"></script>
    <script src="../../libs/aframe/aframe-v1.3.0.min.js"></script>
    <script>
      if (window.AFRAME && AFRAME.components && AFRAME.components.grabbable) {
        delete AFRAME.components.grabbable;
      }
    </script>
    <script src="../../libs/a-game/a-game.min.js"></script>
    <script src="../../js/world/noise-terrain.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }

      #hud {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        background: rgba(0,0,0,0.78); color: #c8e6c9; padding: 16px 20px;
        border-radius: 8px; backdrop-filter: blur(8px);
        border: 1px solid rgba(200,230,201,0.15);
        max-width: 330px; font-size: 13px; line-height: 1.55;
      }
      #hud h2 {
        font-size: 14px; margin-bottom: 10px; color: #a5d6a7;
        letter-spacing: 0.5px; font-weight: 600;
      }
      #hud label {
        display: flex; justify-content: space-between; align-items: center;
        margin: 3px 0;
      }
      #hud label span { min-width: 30px; text-align: right; }
      #hud input[type=range] { width: 130px; accent-color: #66bb6a; }
      #hud input[type=number] {
        width: 65px; background: rgba(255,255,255,0.08);
        border: 1px solid rgba(200,230,201,0.2); color: #c8e6c9;
        padding: 2px 6px; border-radius: 4px; font-family: inherit; font-size: 12px;
      }
      #hud button {
        margin-top: 10px; width: 100%; padding: 8px;
        background: #2e7d32; color: #e8f5e9; border: none;
        border-radius: 6px; cursor: pointer; font-family: inherit;
        font-size: 13px; letter-spacing: 0.3px; transition: background 0.15s;
      }
      #hud button:hover { background: #388e3c; }
      .hint { font-size: 11px; color: #81c784; margin-top: 8px; opacity: 0.65; }
      .fly-link { font-size: 11px; color: #aed581; margin-bottom: 8px; }
      .fly-link a { color: #c5e1a5; }

      #legend {
        position: fixed; bottom: 16px; left: 16px; z-index: 10;
        background: rgba(0,0,0,0.78); color: #c8e6c9; padding: 12px 16px;
        border-radius: 8px; backdrop-filter: blur(8px);
        border: 1px solid rgba(200,230,201,0.15);
        font-size: 12px; line-height: 1.9;
      }
      .sw {
        display: inline-block; width: 11px; height: 11px;
        border-radius: 2px; margin-right: 6px; vertical-align: middle;
      }
    </style>
  </head>
  <body>

    <div id="hud">
      <p class="fly-link">Free-fly (no physics): <a href="index-fly.html">index-fly.html</a></p>
      <h2>Noise Terrain</h2>
      <label>Seed <input type="number" id="seed" value="42"></label>
      <label>Grid Size <input type="range" id="gridSize" min="64" max="512" step="16" value="256"><span id="gridSizeVal">256</span></label>
      <label>World Scale <input type="range" id="worldScale" min="50" max="500" step="10" value="200"><span id="worldScaleVal">200</span></label>
      <label>Height Scale <input type="range" id="heightScale" min="5" max="80" step="1" value="35"><span id="heightScaleVal">35</span></label>
      <label>Noise Scale <input type="range" id="noiseScale" min="0.5" max="8" step="0.1" value="3"><span id="noiseScaleVal">3</span></label>
      <label>Octaves <input type="range" id="octaves" min="1" max="8" step="1" value="6"><span id="octavesVal">6</span></label>
      <label>Water Level <input type="range" id="waterLevel" min="0" max="60" step="1" value="30"><span id="waterLevelVal">30%</span></label>
      <label>Island Falloff <input type="range" id="falloff" min="0" max="100" step="1" value="50"><span id="falloffVal">50%</span></label>
      <button id="generateBtn">&#9654; Generate Terrain</button>
      <div class="hint">Terrain mesh is under <code>floor</code> so a-game locomotion raycasts onto the surface (Cannon has no mesh collider).</div>
    </div>

    <div id="legend">
      <div><span class="sw" style="background:#1a5276"></span>Deep Water</div>
      <div><span class="sw" style="background:#2980b9"></span>Shallow Water</div>
      <div><span class="sw" style="background:#e0c97f"></span>Coast / Sand</div>
      <div><span class="sw" style="background:#52be5a"></span>Plains / Grass</div>
      <div><span class="sw" style="background:#2d8a3e"></span>Forest</div>
      <div><span class="sw" style="background:#6b5b45"></span>Hills / Dirt</div>
      <div><span class="sw" style="background:#8a8a8a"></span>Rock</div>
      <div><span class="sw" style="background:#f0f0f0"></span>Snow</div>
    </div>

    <input type="checkbox" id="save-position-from-vr" hidden aria-hidden="true" />
    <a-scene
      id="scene"
      renderer="antialias: true; colorManagement: true; sortObjects: true"
      fog="type: exponential; color: #87CEEB; density: 0.0015"
      physics="workerUrl: ../../libs/a-game/cannonWorker.min.js?v=hull-guard-1; gravity: 0 -10 0"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
    >
      <a-assets></a-assets>
      <a-sky color="#87CEEB"></a-sky>
      <a-light type="ambient" color="#BBD2E0" intensity="0.5"></a-light>
      <a-light type="directional" color="#FFF5E0" intensity="1.05" position="1 2 0.6"></a-light>

      <!-- Lower terrain + ocean vs scene origin so spawn Y stays comfortably above the mesh. -->
      <a-entity id="world-root" position="0 -8 0">
        <!-- floor: a-game locomotion raycaster targets [floor]; mesh lives under this entity. -->
        <a-entity id="terrain-holder" floor=""></a-entity>
      </a-entity>

      <a-player id="player" locomotion grabbing position="0 20 0"></a-player>
    </a-scene>

    <script>
      window.addEventListener('unhandledrejection', function (event) {
        var name = event.reason && event.reason.name;
        var msg = String((event.reason && event.reason.message) || event.reason || '');
        if (name === 'WrongDocumentError' || msg.indexOf('Pointer lock') !== -1) {
          event.preventDefault();
        }
      });

      function refreshRaycasters(rootScene) {
        var nodes = rootScene.querySelectorAll('[raycaster]');
        for (var i = 0; i < nodes.length; i++) {
          var rc = nodes[i].components && nodes[i].components.raycaster;
          if (rc && typeof rc.refreshObjects === 'function') rc.refreshObjects();
        }
      }

      function relaxPointerLockOnCamera(rootScene) {
        var cam = rootScene.querySelector('a-camera');
        if (!cam) return;
        cam.setAttribute('look-controls', { pointerLockEnabled: false, touchEnabled: false });
      }

      ['gridSize','worldScale','heightScale','noiseScale','octaves','waterLevel','falloff']
        .forEach(function (id) {
          var el = document.getElementById(id);
          var val = document.getElementById(id + 'Val');
          el.addEventListener('input', function () {
            var v = el.value;
            if (id === 'waterLevel' || id === 'falloff') v += '%';
            val.textContent = v;
          });
        });

      function readParams() {
        return {
          seed:        parseInt(document.getElementById('seed').value, 10) || 42,
          gridSize:    parseInt(document.getElementById('gridSize').value, 10),
          worldScale:  parseInt(document.getElementById('worldScale').value, 10),
          heightScale: parseInt(document.getElementById('heightScale').value, 10),
          noiseScale:  parseFloat(document.getElementById('noiseScale').value),
          octaves:     parseInt(document.getElementById('octaves').value, 10),
          waterLevel:  parseInt(document.getElementById('waterLevel').value, 10),
          falloff:     parseInt(document.getElementById('falloff').value, 10)
        };
      }

      var qs = new URLSearchParams(location.search).get('seed');
      if (qs != null) document.getElementById('seed').value = parseInt(qs, 10) || 42;

      var scene = document.getElementById('scene');

      function rebuildTerrain() {
        var worldRoot = document.getElementById('world-root');
        var holder = document.getElementById('terrain-holder');
        var params = readParams();

        var data = NoiseTerrain.build(
          {
            terrainRoot: holder.object3D,
            oceanRoot: worldRoot.object3D
          },
          params
        );

        document.getElementById('player').setAttribute('position', {
          x: 0,
          y: data.spawnPlayerY,
          z: 0
        });

        requestAnimationFrame(function () {
          refreshRaycasters(scene);
          setTimeout(function () {
            refreshRaycasters(scene);
          }, 120);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              relaxPointerLockOnCamera(scene);
            });
          });
        });
      }

      document.getElementById('generateBtn').addEventListener('click', rebuildTerrain);

      scene.addEventListener(
        'loaded',
        function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              rebuildTerrain();
            });
          });
        },
        { once: true }
      );
    </script>
  </body>
</html>
