<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BSP + ridge union (a-game)</title>
    <link rel="icon" href="data:," />
    <script>
      window.AFRAME_CDN_ROOT = new URL('../../libs/aframe-cdn/', document.baseURI).href;
    </script>
    <script src="../../js/aframe-cdn-rewrite.js"></script>
    <script src="../../libs/aframe/aframe-v1.3.0.min.js"></script>
    <script>
      if (window.AFRAME && AFRAME.components && AFRAME.components.grabbable) {
        delete AFRAME.components.grabbable;
      }
    </script>
    <script src="../../libs/a-game/a-game.min.js"></script>
    <script src="../../js/world/bsp-dungeon.js"></script>
    <script src="../../js/world/ridge-field.js"></script>
    <script src="../../js/world/combine-bsp-ridge.js"></script>
    <script src="../../js/world/grid-build.js?v=tierA-pbr-6"></script>
  </head>
  <body>
    <input type="checkbox" id="save-position-from-vr" hidden aria-hidden="true" />
    <a-scene
      id="scene"
      physics="workerUrl: ../../libs/a-game/cannonWorker.min.js?v=hull-guard-1; gravity: 0 -10 0"
      loading-screen="enabled: false"
    >
      <a-assets></a-assets>
      <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
      <a-light type="directional" color="#e8dcc8" intensity="0.55" position="3 10 6"></a-light>
      <a-sky color="#1a2330"></a-sky>
      <a-entity id="world-root"></a-entity>
      <a-player id="player" locomotion grabbing position="0 0 0"></a-player>
    </a-scene>

    <script>
      window.addEventListener('unhandledrejection', function (event) {
        var name = event.reason && event.reason.name;
        var msg = String((event.reason && event.reason.message) || event.reason || '');
        if (name === 'WrongDocumentError' || msg.indexOf('Pointer lock') !== -1) {
          event.preventDefault();
        }
      });

      function refreshRaycasters(rootScene) {
        var nodes = rootScene.querySelectorAll('[raycaster]');
        for (var i = 0; i < nodes.length; i++) {
          var rc = nodes[i].components && nodes[i].components.raycaster;
          if (rc && typeof rc.refreshObjects === 'function') rc.refreshObjects();
        }
      }

      function relaxPointerLockOnCamera(rootScene) {
        var cam = rootScene.querySelector('a-camera');
        if (!cam) return;
        cam.setAttribute('look-controls', { pointerLockEnabled: false, touchEnabled: false });
      }

      var scene = document.getElementById('scene');
      var seed = 1;
      var q = new URLSearchParams(location.search).get('seed');
      if (q != null) seed = parseInt(q, 10) || 1;

      var GRID_W = 48;
      var GRID_H = 40;

      scene.addEventListener(
        'loaded',
        function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              var root = document.getElementById('world-root');
              /*
                Union: BSP floor OR ridge-open. That can attach stray caverns; flood prune from the
                BSP spawn keeps one connected play area.
              */
              var bsp = generateBspDungeon(seed, {
                width: GRID_W,
                height: GRID_H,
                minLeafSize: 8,
                maxDepth: 4
              });
              var ridge = WorldGenRidge.sampleRidgeGrid(GRID_W, GRID_H, seed, {
                scale: 12,
                octaves: 5,
                threshold: 0.55
              });
              var tiles = WorldGenCombine.unionFloor(bsp.tiles, ridge.open);
              var mk = bsp.markers && bsp.markers[0];
              if (mk) {
                tiles = WorldGenCombine.floodPruneToComponent(tiles, mk.x, mk.y);
              }
              var markerTile = mk ? { x: mk.x, y: mk.y } : undefined;
              var out = buildAgameTileWorld(root, tiles, { markerTile: markerTile, seed: seed });

              document.getElementById('player').setAttribute(
                'position',
                out.spawnWorld.x + ' 0 ' + out.spawnWorld.z
              );

              requestAnimationFrame(function () {
                refreshRaycasters(scene);
                setTimeout(function () {
                  refreshRaycasters(scene);
                }, 120);
                requestAnimationFrame(function () {
                  requestAnimationFrame(function () {
                    relaxPointerLockOnCamera(scene);
                  });
                });
              });
            });
          });
        },
        { once: true }
      );
    </script>
  </body>
</html>
